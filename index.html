<!DOCTYPE html>
<html>
<head>
<title>Saravana Women's Dresses</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 font-family:'Arial', Times, serif;
 margin:0;
 background:#f5f5f5;
}

/* HEADER */
header{
 background:#ff3f6c;
 color:white;
 text-align:center;
 padding:15px;
 font-size:24px;
}

/* NAV */
nav{
 display:flex;
 justify-content:center;
 background:white;
}
nav button{
 padding:15px;
 border:none;
 background:none;
 font-weight:bold;
 cursor:pointer;
}
nav button:hover{color:#ff3f6c}

/* CONTAINER */
.container{
 max-width:1000px;
 margin:20px auto;
 background:white;
 padding:20px;
 border-radius:10px;
 display:none;
}
.active{display:block}

/* INPUTS */
input,select{
 width:100%;
 padding:10px;
 margin:8px 0;
 border-radius:8px;
 border:1px solid #ccc;
}

/* BUTTONS */
button{
 padding:10px;
 border:none;
 border-radius:8px;
 margin-top:10px;
 cursor:pointer;
}
.primary{background:#ff3f6c;color:white}
.secondary{background:#333;color:white}

/* TABLE */
table{
 width:100%;
 border-collapse:collapse;
}
th,td{
 padding:10px;
 border:1px solid #ddd;
 text-align:center;
}

/* DASHBOARD */
.dashboard{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
}
.card{
 background:#ffe4ea;
 padding:15px;
 border-radius:10px;
 text-align:center;
 font-weight:bold;
}

/* RECORD BOX */
.record{
 border:1px solid #ddd;
 padding:10px;
 margin:10px 0;
 border-radius:10px;
 cursor:pointer;
}

</style>
</head>

<body>

<header>Saravana Women's Dresses</header>

<nav>
<button onclick="showPage('billing')">Billing</button>
<button onclick="showPage('admin')">Admin</button>
</nav>

<!-- BILLING -->
<div id="billing" class="container active">

<img src="" width="100%" style="border-radius:10px">

<h2>Billing</h2>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">

<select id="item">
        <option value="">Select Item</option>
        <option>Saree Stitching</option>
        <option>Saree</option>
        <option>Chudidhar</option>
        <option>Casual tops</option>
        <option>Nighty</option>
        <option>Inskirt</option>
        <option>Western wear</option>
        <option>Inner wear</option>
        <option>palazo</option>
        <option>Patiyala</option>
        <option>Skirt</option>
        <option>Blouse bit</option>
        <option>Shawl</option>
        <option>Lining</option>
        <option>Leggings</option>
        <option>Blouse Stitching</option>
        <option>Saree Stitching</option>
        <option>Corner Stitching</option>
</select>

<input id="price" type="number" placeholder="Price">
<input id="qty" type="number" placeholder="Quantity">

<button class="primary" onclick="addItem()">Add Item</button>

<table id="billTable">
<tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>
</table>

<input id="discount" type="number" placeholder="Discount %">
<input id="gst" type="number" placeholder="GST %">

<button class="primary" onclick="generateBill()">Generate Bill</button>
<button class="secondary" onclick="newCustomer()">New Customer</button>

<div id="output"></div>

</div>

<!-- ADMIN -->
<div id="admin" class="container">

<h2>Admin Login</h2>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

<h3>Dashboard</h3>

<div class="dashboard">
<div class="card" id="totalSales">Total Sales: ₹0</div>
<div class="card" id="todaySales">Today: ₹0</div>
<div class="card" id="customers">Customers: 0</div>
</div>

<canvas id="chart"></canvas>

<h3>Search Customer</h3>
<input id="search" onkeyup="searchCustomer()" placeholder="Search name">

<h3>Customer Records</h3>
<div id="records"></div>

<h3>Bill Details</h3>
<div id="details"></div>

</div>
</div>

<script>

let items=[],prices=[],qtys=[];
let data = JSON.parse(localStorage.getItem("records")) || [];

function showPage(p){
 document.getElementById("billing").classList.remove("active");
 document.getElementById("admin").classList.remove("active");
 document.getElementById(p).classList.add("active");
}

function addItem(){
 let item=itemEl.value;
 let price=parseFloat(priceEl.value);
 let qty=parseInt(qtyEl.value);

 if(!item||isNaN(price)||isNaN(qty)) return alert("Enter valid");

 items.push(item);
 prices.push(price);
 qtys.push(qty);

 let row=billTable.insertRow();
 row.insertCell(0).innerText=item;
 row.insertCell(1).innerText=price;
 row.insertCell(2).innerText=qty;
 row.insertCell(3).innerText=price*qty;
}

function generateBill(){

 if(items.length===0) return alert("Add items");

 let name=nameEl.value||"Guest";
 let phone=phoneEl.value||"-";

 let total=0;
 for(let i=0;i<prices.length;i++) total+=prices[i]*qtys[i];

 let disc=total*(discountEl.value||0)/100;
 let gstAmt=(total-disc)*(gstEl.value||0)/100;
 let final=Number(total-disc+gstAmt);

 let now=new Date();

 output.innerHTML=`<h3>Invoice</h3>
 Name: ${name}<br>
 Phone: ${phone}<br>
 Date: ${now.toLocaleString()}<br>
 Total: ₹${total}<br>
 Discount: ₹${disc}<br>
 GST: ₹${gstAmt}<br>
 <b>Final: ₹${final}</b>`;

 let record={
 name,phone,
 items:[...items],
 prices:[...prices],
 qtys:[...qtys],
 total,disc,gstAmt,final,
 date:now.toISOString()
 };

 data.push(record);
 localStorage.setItem("records",JSON.stringify(data));

 items=[];prices=[];qtys=[];
}

function newCustomer(){
 items=[];prices=[];qtys=[];
 billTable.innerHTML="<tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th></tr>";
 output.innerHTML="";
}

function login(){
 if(adminUser.value==="admin"&&adminPass.value==="1234"){
  adminPanel.style.display="block";
  loadDashboard();
  loadRecords();
 } else alert("Wrong login");
}

function loadDashboard(){
 let total=0,today=0;
 let todayStr=new Date().toDateString();

 data.forEach(r=>{
 let amt=Number(r.final)||0;
 total+=amt;
 if(new Date(r.date).toDateString()==todayStr) today+=amt;
 });

 totalSales.innerText="Total Sales: ₹"+total;
 todaySales.innerText="Today: ₹"+today;
 customers.innerText="Customers: "+data.length;

 drawChart();
}

function loadRecords(){
 records.innerHTML="";
 data.forEach((r,i)=>{
 let div=document.createElement("div");
 div.className="record";
 div.innerText=r.name+" - ₹"+r.final;
 div.onclick=()=>showDetails(i);
 records.appendChild(div);
 });
}

function showDetails(i){
 let r=data[i];
 let itemsList="";
 for(let j=0;j<r.items.length;j++){
 itemsList+=`<li>${r.items[j]} ₹${r.prices[j]} x ${r.qtys[j]}</li>`;
 }

 details.innerHTML=`<h4>${r.name}</h4>
 <ul>${itemsList}</ul>
 Total: ₹${r.total}<br>
 Discount: ₹${r.disc}<br>
 GST: ₹${r.gstAmt}<br>
 Final: ₹${r.final}`;
}

function searchCustomer(){
 let key=search.value.toLowerCase();
 records.innerHTML="";
 data.forEach((r,i)=>{
 if(r.name.toLowerCase().includes(key)){
 let div=document.createElement("div");
 div.className="record";
 div.innerText=r.name+" - ₹"+r.final;
 div.onclick=()=>showDetails(i);
 records.appendChild(div);
 }
 });
}

function drawChart(){
 let labels=[],values=[];
 data.forEach(r=>{
 labels.push(new Date(r.date).toLocaleDateString());
 values.push(Number(r.final)||0);
 });

 new Chart(chart,{
 type:"bar",
 data:{labels:labels,datasets:[{label:"Sales",data:values}]}
 });
}

const itemEl=document.getElementById("item");
const priceEl=document.getElementById("price");
const qtyEl=document.getElementById("qty");
const billTable=document.getElementById("billTable");
const nameEl=document.getElementById("name");
const phoneEl=document.getElementById("phone");
const discountEl=document.getElementById("discount");
const gstEl=document.getElementById("gst");

</script>

</body>
</html>
